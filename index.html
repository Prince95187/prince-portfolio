<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Prince Kommina — Ships Real Software</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper: "#0A0A0B",
          teal:  "#0D7377",
          navy:  "#1E3A5F",
        },
        fontFamily: {
          sans: ['"Inter"', "ui-sans-serif", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>

<style>
  :root {
    --teal:  #0D7377;
    --navy:  #1E3A5F;
    --paper: #0A0A0B;
    --ink:   #EFEFEE;
    --card:  #111113;
    --ease:  cubic-bezier(0.22, 1, 0.36, 1);
  }

  html, body {
    background: var(--paper);
    color: var(--ink);
    margin: 0;
    font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body.menu-open { overflow: hidden; }

  /* ── ANIMATION PRIMITIVES ────────────────────────────────── */
  .fadeDown {
    opacity: 0; transform: translateY(-20px);
    animation: fadeDown 500ms var(--ease) forwards;
    animation-delay: var(--ad, 0ms);
  }
  @keyframes fadeDown { to { opacity:1; transform:translateY(0); } }

  .fadeUp {
    opacity: 0; transform: translateY(32px);
    animation: fadeUp 600ms var(--ease) forwards;
    animation-delay: var(--ad, 0ms);
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  .word-clip { overflow:hidden; display:block; line-height:0.88; }
  .word-clip > span {
    display:block; transform:translateY(110%);
    animation: wordIn 700ms var(--ease) forwards;
    animation-delay: var(--ad, 400ms);
  }
  @keyframes wordIn { to { transform:translateY(0); } }

  .reveal {
    opacity:0; transform:translateY(28px);
    transition: opacity 900ms var(--ease), transform 900ms var(--ease);
    transition-delay: var(--rd, 0ms);
  }
  .reveal.is-in { opacity:1; transform:none; }

  .reveal-word { overflow:hidden; display:inline-block; line-height:0.92; vertical-align:bottom; }
  .reveal-word > span {
    display:inline-block; transform:translateY(110%);
    transition: transform 800ms var(--ease);
    transition-delay: var(--rd, 0ms);
  }
  .reveal-word.is-in > span { transform:translateY(0); }

  .reveal-line {
    transform-origin:left; transform:scaleX(0);
    transition: transform 900ms var(--ease);
    transition-delay: var(--rd, 0ms);
  }
  .reveal-line.is-in { transform:scaleX(1); }

  @keyframes liveDot {
    0%,100% { box-shadow: 0 0 0 0   rgba(13,115,119,0.5); }
    50%     { box-shadow: 0 0 0 6px rgba(13,115,119,0);   }
  }
  .live-dot {
    width:7px; height:7px; border-radius:9999px;
    background: var(--teal);
    animation: liveDot 2s ease-out infinite;
  }

  /* ── HERO VIDEO BACKGROUND ───────────────────────────────── */
  .hero-video {
    position:absolute; inset:0; z-index:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:0.55;
  }
  .hero-video-overlay {
    position:absolute; inset:0; z-index:1;
    background: linear-gradient(
      180deg,
      rgba(10,10,11,0.10) 0%,
      rgba(10,10,11,0.12) 35%,
      rgba(10,10,11,0.55) 75%,
      rgba(10,10,11,1.00) 100%
    );
  }

  /* Teal ambient glow on top of video */
  .hero-glow {
    position:absolute; inset:0; z-index:2;
    background:
      radial-gradient(50% 40% at 25% 30%, rgba(13,115,119,0.18) 0%, transparent 60%),
      radial-gradient(40% 45% at 80% 60%, rgba(30,58,95,0.14) 0%, transparent 65%);
    pointer-events:none;
  }

  /* ── SHINY GRADIENT TEXT ─────────────────────────────────── */
  .shine-text {
    background: linear-gradient(
      120deg,
      #EFEFEE 0%, #0D7377 25%, #14B8A6 45%, #EFEFEE 60%, #0D7377 80%, #EFEFEE 100%
    );
    background-size: 250% 250%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shineMove 5s ease-in-out infinite;
  }
  @keyframes shineMove {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── BACKGROUND MESH (kept as fallback) ──────────────────── */
  .bg-mesh {
    position:absolute; inset:-10%;
    background:
      radial-gradient(50% 40% at 25% 30%, rgba(13,115,119,0.12) 0%, transparent 60%),
      radial-gradient(40% 45% at 80% 60%, rgba(30, 58, 95,0.10) 0%, transparent 65%);
    filter:blur(24px);
  }

  .guide {
    position:absolute; top:0; bottom:0;
    width:1px; background:rgba(255,255,255,0.04);
  }

  /* ── NAV LINK ────────────────────────────────────────────── */
  .nav-link { position:relative; transition:color 200ms var(--ease); }
  .nav-link::after {
    content:""; position:absolute;
    left:0; right:0; bottom:-6px; height:1px;
    background:var(--teal); transform:scaleX(0);
    transform-origin:left; transition:transform 240ms var(--ease);
  }
  .nav-link:hover { color:var(--teal); }
  .nav-link:hover::after { transform:scaleX(1); }

  /* ── REDUCE MOTION ───────────────────────────────────────── */
  @media (prefers-reduced-motion:reduce) {
    .fadeDown,.fadeUp,.word-clip>span,.bg-mesh,
    .reveal,.reveal-word>span,.reveal-line { animation:none!important; transition:none!important; }
    .fadeDown,.fadeUp { opacity:1; transform:none; }
    .word-clip>span,.reveal-word>span { transform:none; }
    .reveal { opacity:1; transform:none; }
    .reveal-line { transform:scaleX(1); }
  }

  /* ── SECTION SHELL ───────────────────────────────────────── */
  .section { position:relative; padding:140px 20px; }
  @media (min-width:640px)  { .section { padding:160px 32px; } }
  @media (min-width:768px)  { .section { padding:180px 48px; } }
  .section__inner { max-width:1320px; margin:0 auto; }

  .eyebrow {
    font-weight:600; font-size:11px; letter-spacing:0.22em;
    text-transform:uppercase; color:rgba(255,255,255,0.55);
    display:inline-flex; align-items:center; gap:12px;
  }
  .eyebrow::before { content:""; width:28px; height:1px; background:var(--teal); }

  .display {
    font-weight:600; text-transform:uppercase;
    letter-spacing:-0.03em; line-height:0.88; color:var(--ink);
  }
  .display .accent { color:var(--teal); }

  /* ── ABOUT ───────────────────────────────────────────────── */
  .about-grid { display:grid; grid-template-columns:1fr; gap:64px; margin-top:80px; align-items:end; }
  @media (min-width:1024px) { .about-grid { grid-template-columns:0.7fr 1.3fr; gap:80px; } }

  .about-side { display:flex; flex-direction:column; gap:18px; }
  .about-side h3 {
    font-weight:600; font-size:13px; letter-spacing:0.22em;
    text-transform:uppercase; color:rgba(255,255,255,0.55);
  }
  .about-meta { display:grid; grid-template-columns:1fr 1fr; gap:20px 24px; }
  .about-meta > div { display:flex; flex-direction:column; gap:4px; }
  .about-meta .k { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); font-weight:600; }
  .about-meta .v { font-weight:600; font-size:15px; color:var(--ink); }

  .about-essay { display:flex; flex-direction:column; gap:36px; }
  .about-essay p { font-size:18px; line-height:1.55; font-weight:500; color:var(--ink); max-width:660px; }
  @media (min-width:768px) { .about-essay p { font-size:22px; line-height:1.45; } }
  .about-essay p .accent { color:var(--teal); }
  .about-essay p .num {
    display:inline-block; font-weight:600; font-size:11px;
    letter-spacing:0.22em; color:rgba(255,255,255,0.30);
    margin-right:14px; vertical-align:6px;
  }
  @media (min-width:768px) { .about-essay p .num { vertical-align:10px; font-size:13px; } }

  /* ── MARQUEE ─────────────────────────────────────────────── */
  .marquee {
    position:relative;
    border-top:1px solid rgba(255,255,255,0.07);
    border-bottom:1px solid rgba(255,255,255,0.07);
    overflow:hidden; padding:26px 0;
    background:rgba(255,255,255,0.02);
  }
  .marquee::before,.marquee::after {
    content:""; position:absolute; top:0; bottom:0; width:120px; z-index:2; pointer-events:none;
  }
  .marquee::before { left:0;  background:linear-gradient(90deg,  var(--paper), transparent); }
  .marquee::after  { right:0; background:linear-gradient(-90deg, var(--paper), transparent); }
  .marquee__track {
    display:flex; align-items:center; gap:40px;
    width:max-content;
    animation:marquee 60s linear infinite;
  }
  .marquee__track span { font-weight:600; text-transform:uppercase; letter-spacing:0.05em; font-size:22px; color:var(--ink); }
  .marquee__track i   { font-style:normal; color:var(--teal); font-size:8px; transform:translateY(-3px); }
  @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── PROJECTS ────────────────────────────────────────────── */
  .projects { margin-top:80px; }
  .project {
    position:relative; display:grid; grid-template-columns:1fr;
    gap:32px; padding:56px 0;
    border-top:1px solid rgba(255,255,255,0.08);
    transition:padding-left 400ms var(--ease);
    text-decoration:none;
  }
  .project:last-child { border-bottom:1px solid rgba(255,255,255,0.08); }
  .project:hover { padding-left:16px; }
  .project:hover .project__big { color:var(--teal); }
  .project:hover .project__more { color:var(--teal); }
  .project:hover .project__more .arrow { transform:translate(4px,-4px); }
  @media (min-width:1024px) { .project { grid-template-columns:80px 1.2fr 1fr 160px; gap:48px; align-items:end; } }

  .project__num  { font-weight:600; font-size:13px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
  .project__big  {
    font-weight:600; text-transform:uppercase; letter-spacing:-0.03em;
    line-height:0.88; color:var(--ink);
    font-size:clamp(40px,7vw,88px);
    transition:color 350ms var(--ease);
  }
  .project__meta { display:flex; flex-direction:column; gap:16px; }
  .project__desc { font-size:14px; line-height:1.6; color:rgba(255,255,255,0.55); max-width:360px; }
  .project__desc strong { color:var(--ink); font-weight:600; }
  .project__sub  { font-size:10px; letter-spacing:0.22em; text-transform:uppercase; font-weight:600; color:rgba(255,255,255,0.45); }
  .project__tags { display:flex; flex-wrap:wrap; gap:6px; }
  .project__tags > li {
    font-size:10px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase;
    padding:4px 10px; border:1px solid rgba(255,255,255,0.12); border-radius:9999px;
    color:rgba(255,255,255,0.60);
  }
  /* ── iOS Liquid Glass badges ─────────────────────────────── */
  .project__status {
    display:inline-flex; align-items:center; gap:8px;
    font-size:10px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
    padding:7px 16px; border-radius:9999px;
    border:1px solid rgba(255,255,255,0.13);
    align-self:flex-start;
    position:relative; overflow:hidden;
    backdrop-filter:blur(28px) saturate(180%) brightness(1.08);
    -webkit-backdrop-filter:blur(28px) saturate(180%) brightness(1.08);
    background:rgba(255,255,255,0.07);
    color:rgba(255,255,255,0.55);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.12),
      inset 0 -1px 0 rgba(0,0,0,0.14),
      0 4px 16px rgba(0,0,0,0.30);
  }
  /* top-glass highlight */
  .project__status::before {
    content:""; position:absolute;
    top:0; left:0; right:0; height:46%;
    background:linear-gradient(180deg, rgba(255,255,255,0.13) 0%, transparent 100%);
    pointer-events:none; border-radius:9999px 9999px 0 0;
  }
  .project__status.is-live {
    color:#3FDDBB;
    background:rgba(13,115,119,0.20);
    border-color:rgba(63,221,187,0.32);
    box-shadow:
      inset 0 1px 0 rgba(63,221,187,0.18),
      inset 0 -1px 0 rgba(0,0,0,0.14),
      0 0 20px rgba(13,115,119,0.28),
      0 4px 16px rgba(0,0,0,0.30);
  }
  .project__status.is-testing {
    color:#B4A0FF;
    background:rgba(100,60,220,0.14);
    border-color:rgba(180,160,255,0.28);
    box-shadow:
      inset 0 1px 0 rgba(180,160,255,0.16),
      inset 0 -1px 0 rgba(0,0,0,0.14),
      0 0 20px rgba(100,60,220,0.20),
      0 4px 16px rgba(0,0,0,0.30);
  }
  .project__more {
    align-self:end; display:inline-flex; align-items:end; gap:10px;
    font-size:11px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--ink); transition:color 250ms var(--ease); justify-self:end;
  }
  .project__more .arrow { display:inline-block; transition:transform 250ms var(--ease); }

  .featured-strip {
    display:grid; grid-template-columns:1fr; gap:32px;
    margin-top:32px; padding:36px;
    border:1px solid rgba(255,255,255,0.08); border-radius:8px;
    background:rgba(13,115,119,0.06);
    position:relative; overflow:hidden;
  }
  .featured-strip::before {
    content:""; position:absolute; inset:-40px;
    background:radial-gradient(ellipse at 50% 50%, rgba(13,115,119,0.18) 0%, transparent 70%);
    pointer-events:none;
  }
  @media (min-width:900px) { .featured-strip { grid-template-columns:1fr 1fr; gap:56px; align-items:center; padding:48px; } }
  .featured-strip__quote p { font-size:22px; line-height:1.35; font-weight:600; letter-spacing:-0.015em; color:var(--ink); }
  @media (min-width:900px) { .featured-strip__quote p { font-size:28px; } }
  .featured-strip__quote cite {
    display:block; margin-top:16px; font-style:normal;
    font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
    font-weight:600; color:rgba(255,255,255,0.45);
  }
  .featured-strip__metrics { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  @media (min-width:600px) { .featured-strip__metrics { grid-template-columns:repeat(4,1fr); } }
  .featured-strip__metrics > li {
    border-top:1px solid rgba(255,255,255,0.10); padding-top:14px;
    display:flex; flex-direction:column; gap:6px;
  }
  .featured-strip__metrics strong {
    font-weight:600; font-size:clamp(28px,4vw,44px);
    letter-spacing:-0.03em; color:var(--ink);
  }
  .featured-strip__metrics strong .plus { color:var(--teal); font-size:0.5em; vertical-align:top; }
  .featured-strip__metrics .label { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; font-weight:600; color:rgba(255,255,255,0.45); }

  /* ── SERVICES ────────────────────────────────────────────── */
  .services { margin-top:64px; }
  .service-row {
    display:grid; grid-template-columns:56px 1fr;
    gap:24px; padding:36px 0;
    border-top:1px solid rgba(255,255,255,0.08);
    align-items:center; transition:padding-left 350ms var(--ease);
    text-decoration:none;
  }
  .service-row:last-child { border-bottom:1px solid rgba(255,255,255,0.08); }
  .service-row:hover { padding-left:16px; background:rgba(255,255,255,0.015); }
  .service-row:hover .service__title { color:var(--teal); }
  .service-row:hover .service__arrow { transform:translate(4px,-4px); color:var(--teal); }
  @media (min-width:768px) { .service-row { grid-template-columns:80px 1.5fr 1.2fr 60px; gap:40px; padding:44px 0; } }
  .service__num   { font-weight:600; font-size:13px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
  .service__title { font-weight:600; text-transform:uppercase; letter-spacing:-0.025em; line-height:0.92; color:var(--ink); font-size:clamp(28px,4.5vw,56px); transition:color 250ms var(--ease); }
  .service__desc  { font-size:13px; line-height:1.6; color:rgba(255,255,255,0.55); max-width:360px; font-weight:500; }
  .service__arrow { justify-self:end; color:var(--ink); transition:transform 250ms var(--ease),color 250ms var(--ease); display:inline-block; }

  /* ── GLOW STACK (new) ────────────────────────────────────── */
  .glow-grid {
    margin-top:64px;
    display:grid; grid-template-columns:1fr 1fr; gap:20px;
  }
  @media (max-width:767px) { .glow-grid { grid-template-columns:1fr; } }

  .glow-wrapper { position:relative; }

  .glow-bloom {
    position:absolute; inset:-6px; border-radius:38px;
    opacity:0.45; filter:blur(42px); pointer-events:none;
    animation:glowBreath 4s ease-in-out infinite;
  }
  @keyframes glowBreath {
    0%,100% { opacity:0.40; transform:scale(1);    }
    50%     { opacity:0.60; transform:scale(1.03); }
  }
  .glow-wrapper:hover .glow-bloom {
    animation:none; opacity:0.75; transform:scale(1.05);
    transition:opacity 400ms ease, transform 400ms ease;
  }

  .glow-card {
    position:relative; border:6px solid transparent;
    border-radius:32px; overflow:hidden; z-index:1;
    transition:transform 350ms var(--ease), box-shadow 350ms var(--ease);
  }
  .glow-wrapper:hover .glow-card {
    transform:translateY(-3px);
    box-shadow:0 24px 60px rgba(0,0,0,0.5);
  }

  /* shimmer sweep on hover */
  .glow-card::after {
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.05) 50%, transparent 80%);
    opacity:0; transition:opacity 500ms ease;
  }
  .glow-wrapper:hover .glow-card::after { opacity:1; }

  .glow-inner { padding:32px 32px 28px; display:flex; flex-direction:column; gap:20px; }

  .glow-cat-title {
    font-size:13px; font-weight:700; letter-spacing:0.20em;
    text-transform:uppercase; margin:0;
    display:flex; align-items:center; gap:10px;
  }
  .glow-cat-line { display:block; width:20px; height:2px; border-radius:2px; flex-shrink:0; }

  .glow-tags { display:flex; flex-wrap:wrap; gap:7px; list-style:none; padding:0; margin:0; }
  .glow-tag {
    font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase;
    padding:5px 12px; border-radius:9999px;
    border:1px solid rgba(255,255,255,0.10);
    color:rgba(255,255,255,0.70);
    background:rgba(255,255,255,0.04);
    transition:border-color 250ms ease, background 250ms ease, color 250ms ease;
  }
  .glow-wrapper:hover .glow-tag {
    border-color:rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.07);
    color:rgba(255,255,255,0.88);
  }

  /* ── CONTACT ─────────────────────────────────────────────── */
  .contact-display {
    font-weight:600; text-transform:uppercase; letter-spacing:-0.04em;
    line-height:0.88; color:var(--ink);
    font-size:clamp(56px,12vw,180px); margin-top:32px;
  }
  .contact-display .accent { color:var(--teal); }
  .contact__sub { margin-top:32px; font-size:18px; line-height:1.5; color:rgba(255,255,255,0.55); max-width:520px; font-weight:500; }

  .channels {
    margin-top:48px;
    display:flex; flex-direction:column; gap:14px;
  }
  .channel {
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding:20px 28px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.09);
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(12px);
    text-decoration:none; color:var(--ink);
    cursor:pointer;
    transition:background 260ms var(--ease), border-color 260ms var(--ease), box-shadow 260ms var(--ease), transform 260ms var(--ease);
    position:relative; overflow:hidden;
  }
  .channel::before {
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.10),transparent);
    pointer-events:none;
  }
  .channel:hover {
    background:rgba(13,115,119,0.10);
    border-color:rgba(13,115,119,0.35);
    box-shadow:0 0 28px rgba(13,115,119,0.18), inset 0 1px 0 rgba(255,255,255,0.07);
    transform:translateY(-2px);
  }
  .channel:hover .channel__arrow { transform:translate(3px,-3px); color:var(--teal); }
  .channel__left   { display:flex; flex-direction:column; gap:5px; }
  .channel__label  { font-size:9px; font-weight:700; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
  .channel__value  { font-size:17px; font-weight:600; letter-spacing:-0.02em; color:var(--ink); }
  .channel__arrow  { color:rgba(255,255,255,0.50); flex-shrink:0; display:inline-block; transition:transform 250ms var(--ease), color 250ms var(--ease); }
  .channel--soon   { opacity:0.35; pointer-events:none; }

  .form {
    margin-top:56px; border-top:1px solid rgba(255,255,255,0.08); padding-top:56px;
    display:grid; grid-template-columns:1fr; gap:28px;
  }
  @media (min-width:768px) { .form { grid-template-columns:200px 1fr; gap:64px; align-items:start; } }
